<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <?!= include('styles') ?>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- LOADING SCREEN (shown while checking session)              -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="loading-screen" class="page active">
    <div class="loading-center">
      <div class="spinner"></div>
      <p class="loading-text">Loading...</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- LOGIN PAGE                                                  -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="page-login" class="page">
    <div class="login-container">
      <div class="login-header">
        <div class="login-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            <path d="M9 14l2 2 4-4"/>
          </svg>
        </div>
        <h1 class="login-title">Stock Reconciliation</h1>
        <p class="login-subtitle">Sign in to your Frappe account</p>
      </div>

      <form id="login-form" class="login-form" onsubmit="return false;">
        <div id="url-field-wrap" class="form-group">
          <label for="login-url">Frappe Site URL</label>
          <input type="url" id="login-url" placeholder="https://erp.yourcompany.com"
                 autocomplete="url" inputmode="url" required>
          <span class="field-hint">Your Frappe/ERPNext site address</span>
        </div>

        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@company.com"
                 autocomplete="email" inputmode="email" required>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Your password"
                 autocomplete="current-password" required>
        </div>

        <div id="login-error" class="error-msg" style="display:none;"></div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          <span class="btn-text">Sign In</span>
          <div class="btn-spinner spinner-sm" style="display:none;"></div>
        </button>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- MAIN APP (shown after login)                                -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="app-shell" class="page">

    <!-- Top Bar -->
    <header id="top-bar" class="top-bar">
      <h2 id="top-bar-title" class="top-bar-title">Dashboard</h2>
      <button id="top-bar-action" class="icon-btn" style="display:none;" aria-label="Action"></button>
      <button id="btn-logout" class="icon-btn" aria-label="Logout" title="Logout">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <!-- Page content area -->
    <main id="content-area" class="content-area"></main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-item active" data-page="dashboard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-page="create">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <span>New SRT</span>
      </button>
      <button class="nav-item" data-page="history">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>History</span>
      </button>
    </nav>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- MODAL OVERLAY (view SRT detail, approve, reject, etc.)     -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div id="modal-content" class="modal-content"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TOAST                                                       -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="toast" class="toast" style="display:none;"></div>

  <?!= include('script') ?>
</body>
</html>
