<script>
/* ═══════════════════════════════════════════════════════════════════
   SRT Web App — Client-Side Application
   FILE: script.html (in GAS editor)

   Single-Page Application with:
     - Login (Frappe site URL + email + password)
     - Dashboard (2 tabs: Admin Approval, Super Admin Approval)
     - Create SRT form (item search, batch cards, totals)
     - History (past SRTs with status)
     - View SRT detail modal (batches, remarks, approve/reject)
   ═══════════════════════════════════════════════════════════════════ */

// ═════════════════════════════════════════════════════════════════
// §1. UTIL — google.script.run Promise wrapper + helpers
// ═════════════════════════════════════════════════════════════════

// localStorage key for the per-browser session UUID. The server keeps
// the matching Frappe sid; the client only ever holds this opaque key.
const SESSION_STORAGE_KEY = 'srt_session_key';

// Server functions that do NOT take sessionKey as their first arg.
// Everything else is auto-injected with it.
const PUBLIC_FNS = new Set(['login', 'loginWithUrl', 'isUrlLocked']);

function getSessionKey() {
  try { return localStorage.getItem(SESSION_STORAGE_KEY) || ''; } catch (_) { return ''; }
}
function setSessionKey(k) {
  try { if (k) localStorage.setItem(SESSION_STORAGE_KEY, k);
        else   localStorage.removeItem(SESSION_STORAGE_KEY); } catch (_) {}
}

function callServer(fn, ...args) {
  // Inject sessionKey as the first arg for non-public functions so every
  // caller doesn't have to remember to pass it.
  if (!PUBLIC_FNS.has(fn)) {
    const key = getSessionKey();
    if (!key) {
      return Promise.reject(new Error('SESSION_EXPIRED')).catch(err => {
        handleSessionExpired();
        throw err;
      });
    }
    args = [key, ...args];
  }
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(e => reject(new Error(e.message || String(e))))
      [fn](...args);
  }).catch(err => {
    // Any call may surface SESSION_EXPIRED — handle it once, globally,
    // instead of leaving every caller to catch it (most don't).
    if (err && err.message && err.message.indexOf('SESSION_EXPIRED') !== -1) {
      handleSessionExpired();
    }
    throw err;
  });
}

let _sessionRedirecting = false;
function handleSessionExpired() {
  if (_sessionRedirecting) return;
  _sessionRedirecting = true;
  const lastEmail = (App && App.user && App.user.email) || '';
  if (App) App.user = null;
  setSessionKey('');
  // Defer to next tick so any in-flight UI write completes first.
  setTimeout(() => {
    try {
      showPage('page-login');
      const emailInp = $('#login-email');
      if (emailInp && lastEmail) emailInp.value = lastEmail;
      const pwdInp = $('#login-password');
      if (pwdInp) { pwdInp.value = ''; pwdInp.focus(); }
      showToast('Your session expired. Please sign in again.', 'warning', 5000);
    } finally {
      // Allow future expiries to re-trigger the flow.
      setTimeout(() => { _sessionRedirecting = false; }, 1000);
    }
  }, 0);
}

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function fmtNum(v, precision) {
  const n = Number(v) || 0;
  return n.toLocaleString('en-IN', {
    minimumFractionDigits: precision || 0,
    maximumFractionDigits: precision || 3,
  });
}

function fmtDate(d) {
  if (!d) return '-';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}

const _MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// "12-Jan-2026 11:30 am" — used on History cards.
function fmtDateTime(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return '';
  const day = String(dt.getDate()).padStart(2, '0');
  const mon = _MONTHS_SHORT[dt.getMonth()];
  const year = dt.getFullYear();
  let h = dt.getHours();
  const m = String(dt.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${day}-${mon}-${year} ${h}:${m} ${ampm}`;
}

function isToday(d) {
  if (!d) return false;
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return false;
  const t = new Date();
  return dt.getFullYear() === t.getFullYear()
      && dt.getMonth() === t.getMonth()
      && dt.getDate() === t.getDate();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}


// ═════════════════════════════════════════════════════════════════
// §2. STATE
// ═════════════════════════════════════════════════════════════════

const App = {
  user: null,       // { email, fullName, roles }
  currentPage: '',  // 'dashboard' | 'create' | 'history'
  // Pre-loaded master data (fetched once on app init, searched locally)
  allItems: [],       // [{ name, item_name }]
  allWarehouses: [],  // [{ name }]
  allBatches: [],     // [{ name, item, expiry_date }] — for current item
  dashboard: {
    tab: 'Admin Approval Pending',
    rows: [],
    counts: {},
    selected: new Set(),
    loading: false,
  },
  form: {
    item: '', item_name: '', default_warehouse: '',
    posting_date: '', posting_time: '',
    default_uom: '', higher_uom: '', higher_uom_cf: 1,
    total_current_stock_in_default_uom: 0,
    total_current_stock_in_higher_uom: 0,
    total_qty_found_in_default_uom: 0,
    total_qty_found_in_higher_uom: 0,
    batches: [],
    company: '',
    name: null, modified: null,
  },
  history: { rows: [], loading: false, lastSubmittedName: null },
};

function hasRole(role) {
  return App.user && App.user.roles && App.user.roles.includes(role);
}
function isAdmin() {
  return hasRole('Srt Admin') || hasRole('System Manager') || (App.user && App.user.email === 'Administrator');
}
function isSuperAdmin() {
  return hasRole('Srt Super Admin') || hasRole('System Manager') || (App.user && App.user.email === 'Administrator');
}


// ═════════════════════════════════════════════════════════════════
// §3. TOAST
// ═════════════════════════════════════════════════════════════════

let _toastTimer = null;
function showToast(msg, type, duration) {
  const el = $('#toast');
  el.textContent = msg;
  el.className = 'toast' + (type ? ' toast-' + type : '');
  el.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.style.display = 'none'; }, duration || 3000);
}


// ═════════════════════════════════════════════════════════════════
// §4. MODAL
// ═════════════════════════════════════════════════════════════════

function showModal(html) {
  $('#modal-content').innerHTML = html;
  $('#modal-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  $('#modal-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

// Close modal on overlay tap
document.addEventListener('DOMContentLoaded', () => {
  $('#modal-overlay').addEventListener('click', e => {
    if (e.target === $('#modal-overlay')) closeModal();
  });
});


// ═════════════════════════════════════════════════════════════════
// §5. ROUTER
// ═════════════════════════════════════════════════════════════════

function navigateTo(page) {
  App.currentPage = page;
  $$('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  const titles = { dashboard: 'Dashboard', create: 'New SRT', history: 'History' };
  $('#top-bar-title').textContent = titles[page] || 'SRT';

  const contentArea = $('#content-area');
  contentArea.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  switch (page) {
    case 'dashboard': renderDashboard(); break;
    case 'create':    renderCreateForm(); break;
    case 'history':   renderHistory(); break;
    default:          renderDashboard();
  }
}


// ═════════════════════════════════════════════════════════════════
// §6. LOGIN
// ═════════════════════════════════════════════════════════════════

function initLogin() {
  const form = $('#login-form');
  const btn = $('#login-btn');
  const errEl = $('#login-error');

  // Hide URL field — URL comes from FRAPPE_URL in Code.gs
  $('#url-field-wrap').style.display = 'none';
  $('#login-url').removeAttribute('required');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.style.display = 'none';
    btn.classList.add('loading');
    btn.disabled = true;

    const email = $('#login-email').value.trim();
    const pwd = $('#login-password').value;

    try {
      const result = await callServer('login', email, pwd);
      if (!result.success) {
        errEl.textContent = result.error || 'Login failed';
        errEl.style.display = 'block';
        return;
      }

      // Persist the per-browser session key — every subsequent callServer
      // call auto-injects it as the first argument to the GAS function.
      setSessionKey(result.sessionKey || '');
      App.user = { email: result.email, fullName: result.fullName, roles: result.roles };
      showApp();
    } catch (err) {
      errEl.textContent = err.message || 'Connection failed';
      errEl.style.display = 'block';
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
}


// ═════════════════════════════════════════════════════════════════
// §7. APP INIT
// ═════════════════════════════════════════════════════════════════

function showPage(id) {
  $$('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function showApp() {
  showPage('app-shell');
  // Wire up bottom nav
  $$('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => navigateTo(btn.dataset.page));
  });
  // Wire up logout
  $('#btn-logout').addEventListener('click', async () => {
    try { await callServer('logout'); } catch(_) {}
    setSessionKey('');
    App.user = null;
    showPage('page-login');
  });

  // Pre-load items + warehouses in background (cached server-side for 1hr)
  prefetchMasterData();

  navigateTo('dashboard');
}

async function prefetchMasterData() {
  try {
    const [items, whs] = await Promise.all([
      callServer('getAllItems'),
      callServer('getAllWarehouses'),
    ]);
    App.allItems = items || [];
    App.allWarehouses = whs || [];
  } catch(_) {
    // Fallback: will use server search if pre-load fails
  }
}

// Boot
document.addEventListener('DOMContentLoaded', async () => {
  initLogin();

  // No stored session key → straight to login, don't roundtrip to GAS.
  if (!getSessionKey()) {
    showPage('page-login');
    return;
  }

  try {
    // Suppress the global SESSION_EXPIRED toast on first load — we just
    // want to know whether to resume or show login, silently.
    _sessionRedirecting = true;
    const session = await callServer('checkSession');
    _sessionRedirecting = false;
    if (session.loggedIn) {
      App.user = { email: session.email, fullName: session.fullName, roles: session.roles };
      showApp();
    } else {
      setSessionKey('');
      showPage('page-login');
    }
  } catch (e) {
    _sessionRedirecting = false;
    setSessionKey('');
    showPage('page-login');
  }
});


// ═════════════════════════════════════════════════════════════════
// §8. DASHBOARD
// ═════════════════════════════════════════════════════════════════

async function renderDashboard() {
  const area = $('#content-area');
  App.dashboard.selected.clear();

  // Always show both tabs — server-side get_dashboard_rows handles
  // permission filtering. Hiding tabs client-side is unreliable because
  // role detection can fail if get_form_meta errors during login.
  const tabs = ['Admin Approval Pending', 'Super Admin Approval Pending'];

  if (!tabs.includes(App.dashboard.tab)) App.dashboard.tab = tabs[0];

  // Fetch counts
  try {
    App.dashboard.counts = await callServer('getDashboardCounts');
  } catch(_) { App.dashboard.counts = {}; }

  area.innerHTML = buildDashboardHtml(tabs);
  bindDashboardEvents(tabs);
  loadDashboardRows();
}

function buildDashboardHtml(tabs) {
  const tabsHtml = tabs.map(t => {
    const count = App.dashboard.counts[t] || 0;
    const active = t === App.dashboard.tab ? 'active' : '';
    const label = t === 'Admin Approval Pending' ? 'Admin' : 'Super Admin';
    return `<button class="tab-btn ${active}" data-tab="${escHtml(t)}">
      ${label} <span class="tab-badge">${count}</span>
    </button>`;
  }).join('');

  return `
    <div class="refresh-bar">
      <button onclick="loadDashboardRows()">Refresh</button>
    </div>
    <div class="tabs">${tabsHtml}</div>
    <div class="select-all-bar hidden" id="select-all-bar">
      <input type="checkbox" id="select-all-cb">
      <label for="select-all-cb">Select All</label>
    </div>
    <div id="dashboard-list"></div>
    <div id="bulk-bar" class="bulk-bar hidden"></div>
  `;
}

function bindDashboardEvents(tabs) {
  // Tab switching
  $$('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      App.dashboard.tab = btn.dataset.tab;
      App.dashboard.selected.clear();
      $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === App.dashboard.tab));
      loadDashboardRows();
    });
  });

  // Select all
  const selectAllCb = $('#select-all-cb');
  if (selectAllCb) {
    selectAllCb.addEventListener('change', () => {
      if (selectAllCb.checked) {
        App.dashboard.rows.forEach(r => App.dashboard.selected.add(r.name));
      } else {
        App.dashboard.selected.clear();
      }
      updateDashboardSelection();
    });
  }
}

async function loadDashboardRows() {
  const list = $('#dashboard-list');
  if (!list) return;
  list.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  App.dashboard.selected.clear();
  updateBulkBar();

  try {
    App.dashboard.rows = await callServer('getDashboardRows', App.dashboard.tab, null);
    renderDashboardList();
  } catch (e) {
    if (e.message && e.message.includes('SESSION_EXPIRED')) {
      showToast('Session expired — please login again', 'error');
      showPage('page-login');
      return;
    }
    list.innerHTML = `<div class="empty-state">
      <h3>Error loading data</h3>
      <p>${escHtml(e.message)}</p>
    </div>`;
  }
}

function renderDashboardList() {
  const list = $('#dashboard-list');
  const rows = App.dashboard.rows || [];

  if (rows.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <h3>No pending approvals</h3>
      <p>All caught up! Check back later.</p>
    </div>`;
    $('#select-all-bar').classList.add('hidden');
    return;
  }

  // Show select all bar for admins
  const canApprove = (App.dashboard.tab === 'Admin Approval Pending' && isAdmin())
                  || (App.dashboard.tab === 'Super Admin Approval Pending' && isSuperAdmin());
  const selBar = $('#select-all-bar');
  if (canApprove && rows.length > 1) {
    selBar.classList.remove('hidden');
  } else {
    selBar.classList.add('hidden');
  }

  list.innerHTML = rows.map(r => {
    const sel = App.dashboard.selected.has(r.name) ? 'checked' : '';
    const pill = statusPill(r.workflow_state);
    const delta = (Number(r.total_qty_found_in_default_uom) || 0) -
                  (Number(r.total_current_stock_in_default_uom) || 0);
    const deltaClass = Math.abs(delta) < 0.001 ? 'delta-matched' : (delta > 0 ? 'delta-over' : 'delta-short');

    const deltaSign = delta >= 0 ? '+' : '';

    return `<div class="card" data-name="${escHtml(r.name)}">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2" style="gap:10px; flex:1; min-width:0;">
          ${canApprove ? `<input type="checkbox" class="dash-cb" data-name="${escHtml(r.name)}" ${sel}
            style="width:20px;height:20px;accent-color:#4f46e5;flex-shrink:0;">` : ''}
          <div style="min-width:0; flex:1;">
            <div class="card-title truncate">${escHtml(r.item)} : ${escHtml(r.item_name || '')}</div>
            <div class="card-subtitle truncate">${escHtml(r.name)} &middot; ${escHtml(r.default_warehouse)}</div>
          </div>
        </div>
        ${pill}
      </div>
      <div class="card-row">
        <div>
          <span class="card-label">Snapshot Stock</span>
          <span class="card-value" style="margin-left:6px;">${fmtNum(r.total_current_stock_in_default_uom)}</span>
          <span class="total-uom">${escHtml(r.default_uom || '')}</span>
        </div>
        <div>
          <span class="card-label">Physical Found</span>
          <span class="card-value" style="margin-left:6px;">${fmtNum(r.total_qty_found_in_default_uom)}</span>
          <span class="total-uom">${escHtml(r.default_uom || '')}</span>
        </div>
      </div>
      <div class="card-row" style="margin-top:4px;">
        <div>
          <span class="card-label">Difference</span>
          <span class="card-value ${deltaClass}" style="margin-left:6px;font-size:15px;">${deltaSign}${fmtNum(delta)} ${escHtml(r.default_uom || '')}</span>
        </div>
      </div>
      <div class="card-row" style="margin-top:4px;">
        <span class="card-label">${fmtDate(r.posting_date)}</span>
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); viewSrt('${escHtml(r.name)}')">
          View
        </button>
      </div>
    </div>`;
  }).join('');

  // Bind card taps
  list.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
      viewSrt(card.dataset.name);
    });
  });

  // Bind checkboxes
  list.querySelectorAll('.dash-cb').forEach(cb => {
    cb.addEventListener('change', e => {
      e.stopPropagation();
      if (cb.checked) App.dashboard.selected.add(cb.dataset.name);
      else App.dashboard.selected.delete(cb.dataset.name);
      updateBulkBar();
    });
  });
}

function updateDashboardSelection() {
  $$('.dash-cb').forEach(cb => {
    cb.checked = App.dashboard.selected.has(cb.dataset.name);
  });
  updateBulkBar();
}

function updateBulkBar() {
  const bar = $('#bulk-bar');
  if (!bar) return;
  const count = App.dashboard.selected.size;
  if (count === 0) {
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');
  bar.innerHTML = `
    <span class="bulk-count">${count} selected</span>
    <div class="bulk-actions">
      <button class="btn btn-success btn-sm" onclick="bulkApprove()">Approve All</button>
      <button class="btn btn-danger btn-sm" onclick="bulkReject()">Reject All</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;" onclick="App.dashboard.selected.clear(); updateDashboardSelection();">Cancel</button>
    </div>
  `;
}

async function bulkApprove() {
  const names = Array.from(App.dashboard.selected);
  if (names.length === 0) return;

  const remark = prompt('Add a remark for all (optional):') || '';

  showToast('Approving ' + names.length + ' SRTs...', '');
  try {
    const results = await callServer('bulkApproveSrt', names, remark);
    const ok = results.filter(r => r.ok).length;
    const fail = results.filter(r => !r.ok).length;
    if (fail > 0) {
      showToast(`${ok} approved, ${fail} failed`, 'warning', 4000);
    } else {
      showToast(`${ok} approved successfully`, 'success');
    }
    App.dashboard.selected.clear();
    // Refresh
    App.dashboard.counts = await callServer('getDashboardCounts');
    $$('.tab-btn').forEach(btn => {
      const t = btn.dataset.tab;
      const badge = btn.querySelector('.tab-badge');
      if (badge) badge.textContent = App.dashboard.counts[t] || 0;
    });
    loadDashboardRows();
  } catch (e) {
    showToast(e.message || 'Bulk approve failed', 'error');
  }
}

async function bulkReject() {
  const names = Array.from(App.dashboard.selected);
  if (names.length === 0) return;

  const reason = prompt('Reason for rejecting all (required):');
  if (!reason || !reason.trim()) {
    showToast('Rejection reason is required', 'warning');
    return;
  }

  showToast('Rejecting ' + names.length + ' SRTs...', '');
  try {
    const results = await callServer('bulkRejectSrt', names, reason.trim());
    const ok = results.filter(r => r.ok).length;
    const fail = results.filter(r => !r.ok).length;
    if (fail > 0) {
      showToast(`${ok} rejected, ${fail} failed`, 'warning', 4000);
    } else {
      showToast(`${ok} rejected successfully`, 'success');
    }
    App.dashboard.selected.clear();
    // Refresh
    App.dashboard.counts = await callServer('getDashboardCounts');
    $$('.tab-btn').forEach(btn => {
      const t = btn.dataset.tab;
      const badge = btn.querySelector('.tab-badge');
      if (badge) badge.textContent = App.dashboard.counts[t] || 0;
    });
    loadDashboardRows();
  } catch (e) {
    showToast(e.message || 'Bulk reject failed', 'error');
  }
}

function statusPill(state) {
  const map = {
    'Draft':                  ['pill-draft',     'Draft'],
    'Admin Approval':         ['pill-admin',     'Admin Approved'],
    'Super Admin Approval':   ['pill-super',     'Completed'],
    'Approved By System':     ['pill-system',    'Auto-Approved'],
    'Close':                  ['pill-close',     'Closed'],
  };
  const [cls, label] = map[state] || ['pill-draft', state || 'Unknown'];
  return `<span class="pill ${cls}">${escHtml(label)}</span>`;
}


// ═════════════════════════════════════════════════════════════════
// §9. VIEW SRT DETAIL (MODAL)
// ═════════════════════════════════════════════════════════════════

async function viewSrt(name) {
  showModal(`<div class="modal-body"><div class="loading-center"><div class="spinner"></div><p class="loading-text">Loading...</p></div></div>`);

  try {
    const [doc, batches] = await Promise.all([
      callServer('getSrtDoc', name),
      callServer('getBatchSummary', name),
    ]);

    const canApproveAdmin = isAdmin() && doc.workflow_state === 'Draft' && doc.docstatus === 0;
    const canApproveSuperAdmin = isSuperAdmin() && doc.workflow_state === 'Admin Approval' && doc.docstatus === 1;
    const canReject = (canApproveAdmin || canApproveSuperAdmin);
    const canApprove = canApproveAdmin || canApproveSuperAdmin;

    const remarkLabel = canApproveAdmin ? 'Admin Remark' : 'Super Admin Remark';

    const batchesHtml = (batches || []).map(b => {
      const qf = Number(b.qty_found) || 0;
      const cur = Number(b.current_stock_in_selected_uom) || 0;
      const curStock = Number(b.current_stock_in_stock_uom) || 0;
      const cf = Number(b.conversion_factor) || 1;
      const qfInStock = qf * cf;
      const delta = qf - cur;
      const cls = !b.is_counted ? '' :
                  (Math.abs(delta) < 0.001 ? 'matched' : (delta > 0 ? 'over' : 'short'));
      const selUom = b.select_uom || b.stock_uom;
      const stockUom = b.stock_uom || '';
      const showBothUom = selUom !== stockUom;
      return `<div class="batch-card ${cls}" style="${!b.is_counted ? 'opacity:0.5;' : ''}">
        <div class="batch-header">
          <span class="batch-name">${escHtml(b.batch_no)}</span>
          <span class="pill ${b.is_counted ? 'pill-admin' : 'pill-close'}" style="font-size:10px;">
            ${b.is_counted ? 'Counted' : 'Uncounted'}
          </span>
        </div>
        <div class="batch-fields">
          <div class="batch-field">
            <label>Current (${escHtml(selUom)})</label>
            <div class="value">${fmtNum(cur)}</div>
          </div>
          <div class="batch-field">
            <label>Found (${escHtml(selUom)})</label>
            <div class="value" style="font-weight:700;">${b.is_counted ? fmtNum(qf) : '-'}</div>
          </div>
          ${showBothUom ? `
          <div class="batch-field">
            <label>Current (${escHtml(stockUom)})</label>
            <div class="value">${fmtNum(curStock)}</div>
          </div>
          <div class="batch-field">
            <label>Found (${escHtml(stockUom)})</label>
            <div class="value" style="font-weight:700;">${b.is_counted ? fmtNum(qfInStock) : '-'}</div>
          </div>` : ''}
        </div>
      </div>`;
    }).join('');

    // Admin sees: user remark only
    // Super Admin sees: user + admin remarks
    // Regular user sees: nothing (no remark cards)
    const visibleRemarks = [];
    if (canApproveAdmin || canApproveSuperAdmin) {
      if (doc.user_remark) visibleRemarks.push({ title: 'User Remark', val: doc.user_remark });
    }
    if (canApproveSuperAdmin) {
      if (doc.admin_remark) visibleRemarks.push({ title: 'Admin Remark', val: doc.admin_remark });
    }
    const remarksHtml = visibleRemarks.map(r => `
      <div class="remark-card">
        <div class="remark-card-title">${r.title}</div>
        <div class="remark-card-body">${escHtml(r.val)}</div>
      </div>
    `).join('');

    showModal(`
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div>
          <div class="modal-title">${escHtml(doc.item)} : ${escHtml(doc.item_name || '')}</div>
          <div style="font-size:12px;color:#64748b;">${escHtml(doc.name)} &middot; ${fmtDate(doc.posting_date)}</div>
        </div>
        ${statusPill(doc.workflow_state)}
      </div>
      <div class="modal-body">
        <div class="totals-panel">
          <div class="totals-grid">
            <div class="total-item">
              <div class="total-label">Snapshot (${escHtml(doc.default_uom)})</div>
              <div class="total-value">${fmtNum(doc.total_current_stock_in_default_uom)}</div>
            </div>
            <div class="total-item">
              <div class="total-label">Found (${escHtml(doc.default_uom)})</div>
              <div class="total-value">${fmtNum(doc.total_qty_found_in_default_uom)}</div>
            </div>
            ${doc.higher_uom && doc.higher_uom !== doc.default_uom ? `
            <div class="total-item">
              <div class="total-label">Snapshot (${escHtml(doc.higher_uom)})</div>
              <div class="total-value">${fmtNum(doc.total_current_stock_in_higher_uom)}</div>
            </div>
            <div class="total-item">
              <div class="total-label">Found (${escHtml(doc.higher_uom)})</div>
              <div class="total-value">${fmtNum(doc.total_qty_found_in_higher_uom)}</div>
            </div>` : ''}
          </div>
          ${(() => {
            const d = (Number(doc.total_qty_found_in_default_uom) || 0) - (Number(doc.total_current_stock_in_default_uom) || 0);
            const cls = Math.abs(d) < 0.001 ? 'delta-matched' : (d > 0 ? 'delta-over' : 'delta-short');
            const sign = d >= 0 ? '+' : '';
            const diffHtml = '<div class="card-row mt-2"><span class="card-label">Difference</span><span class="total-value ' + cls + '" style="font-size:16px;font-weight:700;">' + sign + fmtNum(d) + ' ' + escHtml(doc.default_uom) + '</span></div>';
            if (doc.higher_uom && doc.higher_uom !== doc.default_uom) {
              const hcf = Number(doc.higher_uom_cf) || 1;
              const dh = d / hcf;
              const signH = dh >= 0 ? '+' : '';
              return diffHtml + '<div class="card-row" style="margin-top:2px;"><span class="card-label"></span><span class="total-value ' + cls + '" style="font-size:13px;">' + signH + fmtNum(dh) + ' ' + escHtml(doc.higher_uom) + '</span></div>';
            }
            return diffHtml;
          })()}
        </div>

        ${remarksHtml}

        ${canApprove || canReject ? `
          <div class="form-group mt-3">
            <label for="modal-remark">${remarkLabel} <span style="color:#e11d48;">*</span></label>
            <textarea id="modal-remark" rows="2" placeholder="Enter your remark (required)" required></textarea>
          </div>
        ` : ''}

        <div class="section-header mt-3">Batches (${(batches || []).length})</div>
        ${batchesHtml || '<p style="color:#94a3b8;font-size:13px;">No batches</p>'}
      </div>
      ${canApprove || canReject ? `
        <div class="modal-footer">
          ${canReject ? `<button class="btn btn-danger btn-sm" style="flex:1;" onclick="rejectFromModal('${escHtml(doc.name)}')">Reject</button>` : ''}
          ${canApprove ? `<button class="btn btn-success" style="flex:2;" onclick="approveFromModal('${escHtml(doc.name)}')">Approve</button>` : ''}
        </div>
      ` : `<div class="modal-footer"><button class="btn btn-outline btn-full" onclick="closeModal()">Close</button></div>`}
    `);
  } catch (e) {
    showModal(`<div class="modal-body"><div class="error-msg">${escHtml(e.message)}</div>
      <div class="mt-3"><button class="btn btn-outline btn-full" onclick="closeModal()">Close</button></div></div>`);
  }
}

async function approveFromModal(name) {
  const remarkEl = $('#modal-remark');
  const remark = remarkEl ? remarkEl.value.trim() : '';
  if (!remark) {
    showToast('Remark is required', 'warning');
    if (remarkEl) remarkEl.focus();
    return;
  }

  showToast('Approving...', '');
  try {
    await callServer('approveSrt', name, remark);
    closeModal();
    showToast('Approved successfully', 'success');
    loadDashboardRows();
    // Refresh counts
    try {
      App.dashboard.counts = await callServer('getDashboardCounts');
      $$('.tab-btn').forEach(btn => {
        const badge = btn.querySelector('.tab-badge');
        if (badge) badge.textContent = App.dashboard.counts[btn.dataset.tab] || 0;
      });
    } catch(_) {}
  } catch (e) {
    showToast(e.message || 'Approve failed', 'error', 5000);
  }
}

async function rejectFromModal(name) {
  const remarkEl = $('#modal-remark');
  const reason = remarkEl ? remarkEl.value.trim() : '';
  if (!reason) {
    showToast('Remark is required for rejection', 'warning');
    if (remarkEl) remarkEl.focus();
    return;
  }
  showToast('Rejecting...', '');
  try {
    await callServer('rejectSrt', name, reason);
    closeModal();
    showToast('Rejected', 'success');
    loadDashboardRows();
    try {
      App.dashboard.counts = await callServer('getDashboardCounts');
      $$('.tab-btn').forEach(btn => {
        const badge = btn.querySelector('.tab-badge');
        if (badge) badge.textContent = App.dashboard.counts[btn.dataset.tab] || 0;
      });
    } catch(_) {}
  } catch (e) {
    showToast(e.message || 'Reject failed', 'error', 5000);
  }
}

function _localFilter(list, txt, keys) {
  const q = (txt || '').toLowerCase();
  if (!q) return list.slice(0, 30);
  return list.filter(r => keys.some(k => (r[k] || '').toLowerCase().includes(q))).slice(0, 30);
}

function _toggleClear(inputEl, clearBtnId) {
  const btn = $('#' + clearBtnId);
  if (btn) btn.classList.toggle('visible', !!inputEl.value.trim());
}

function bindFormSearch() {
  // ── Item search (local from App.allItems, fallback to server) ──
  const itemInput = $('#item-search');
  const itemResults = $('#item-results');
  const itemClear = $('#item-clear');

  function renderItemResults(txt) {
    _toggleClear(itemInput, 'item-clear');
    if (txt.length < 1) { itemResults.classList.remove('show'); return; }
    if (App.allItems.length > 0) {
      const items = _localFilter(App.allItems, txt, ['name', 'item_name']);
      if (items.length === 0) {
        itemResults.innerHTML = '<div class="search-result-item" style="color:#94a3b8;">No items found</div>';
      } else {
        itemResults.innerHTML = items.map(it =>
          `<div class="search-result-item" data-code="${escHtml(it.name)}" data-item-name="${escHtml(it.item_name || '')}">
            <strong>${escHtml(it.name)}</strong> : ${escHtml(it.item_name || '')}
          </div>`
        ).join('');
      }
      itemResults.classList.add('show');
    } else {
      _serverSearchItems(txt, itemResults);
    }
  }

  async function _serverSearchItems(txt, el) {
    try {
      const items = await callServer('searchItems', txt);
      if (items.length === 0) {
        el.innerHTML = '<div class="search-result-item" style="color:#94a3b8;">No items found</div>';
      } else {
        el.innerHTML = items.map(it =>
          `<div class="search-result-item" data-code="${escHtml(it.name)}" data-item-name="${escHtml(it.item_name || '')}">
            <strong>${escHtml(it.name)}</strong> : ${escHtml(it.item_name || '')}
          </div>`
        ).join('');
      }
      el.classList.add('show');
    } catch(e) {
      el.innerHTML = `<div class="search-result-item" style="color:#e11d48;">${escHtml(e.message)}</div>`;
      el.classList.add('show');
    }
  }

  itemInput.addEventListener('input', () => renderItemResults(itemInput.value.trim()));
  itemInput.addEventListener('focus', () => renderItemResults(itemInput.value.trim()));
  itemResults.addEventListener('click', e => {
    const item = e.target.closest('.search-result-item');
    if (!item || !item.dataset.code) return;
    App.form.item = item.dataset.code;
    App.form.item_name = item.dataset.itemName || '';
    itemInput.value = item.dataset.code + ' : ' + (item.dataset.itemName || '');
    itemResults.classList.remove('show');
    _toggleClear(itemInput, 'item-clear');
    // Pre-load all batches for this item in background
    prefetchBatchesForItem(App.form.item);
    tryLoadBatches();
  });

  // Item clear button
  itemClear.addEventListener('click', () => {
    App.form.item = '';
    App.form.item_name = '';
    App.form.batches = [];
    App.allBatches = [];
    itemInput.value = '';
    itemResults.classList.remove('show');
    itemClear.classList.remove('visible');
    $('#form-batches').innerHTML = '';
    $('#form-totals').style.display = 'none';
    $('#form-actions').style.display = 'none';
    $('#form-remark-wrap').style.display = 'none';
    $('#add-batch-wrap').style.display = 'none';
    itemInput.focus();
  });

  // ── Warehouse search (local from App.allWarehouses, fallback to server) ──
  const whInput = $('#wh-search');
  const whResults = $('#wh-results');
  const whClear = $('#wh-clear');

  function renderWhResults(txt) {
    _toggleClear(whInput, 'wh-clear');
    if (txt.length < 1) { whResults.classList.remove('show'); return; }
    if (App.allWarehouses.length > 0) {
      const whs = _localFilter(App.allWarehouses, txt, ['name']);
      if (whs.length === 0) {
        whResults.innerHTML = '<div class="search-result-item" style="color:#94a3b8;">No warehouses found</div>';
      } else {
        whResults.innerHTML = whs.map(w =>
          `<div class="search-result-item" data-name="${escHtml(w.name)}">${escHtml(w.name)}</div>`
        ).join('');
      }
      whResults.classList.add('show');
    } else {
      _serverSearchWh(txt, whResults);
    }
  }

  async function _serverSearchWh(txt, el) {
    try {
      const whs = await callServer('searchWarehouses', txt);
      if (whs.length === 0) {
        el.innerHTML = '<div class="search-result-item" style="color:#94a3b8;">No warehouses found</div>';
      } else {
        el.innerHTML = whs.map(w =>
          `<div class="search-result-item" data-name="${escHtml(w.name)}">${escHtml(w.name)}</div>`
        ).join('');
      }
      el.classList.add('show');
    } catch(e) {
      el.innerHTML = `<div class="search-result-item" style="color:#e11d48;">${escHtml(e.message)}</div>`;
      el.classList.add('show');
    }
  }

  whInput.addEventListener('input', () => renderWhResults(whInput.value.trim()));
  whInput.addEventListener('focus', () => renderWhResults(whInput.value.trim()));
  whResults.addEventListener('click', e => {
    const wh = e.target.closest('.search-result-item');
    if (!wh || !wh.dataset.name) return;
    App.form.default_warehouse = wh.dataset.name;
    whInput.value = wh.dataset.name;
    whResults.classList.remove('show');
    _toggleClear(whInput, 'wh-clear');
    tryLoadBatches();
  });

  // Warehouse clear button
  whClear.addEventListener('click', () => {
    App.form.default_warehouse = '';
    App.form.batches = [];
    whInput.value = '';
    whResults.classList.remove('show');
    whClear.classList.remove('visible');
    $('#form-batches').innerHTML = '';
    $('#form-totals').style.display = 'none';
    $('#form-actions').style.display = 'none';
    $('#form-remark-wrap').style.display = 'none';
    $('#add-batch-wrap').style.display = 'none';
    whInput.focus();
  });

  // ── Close dropdowns on outside tap ──
  document.addEventListener('click', e => {
    if (!e.target.closest('#item-search') && !e.target.closest('#item-results') && !e.target.closest('#item-clear')) {
      itemResults.classList.remove('show');
    }
    if (!e.target.closest('#wh-search') && !e.target.closest('#wh-results') && !e.target.closest('#wh-clear')) {
      whResults.classList.remove('show');
    }
    if (!e.target.closest('#batch-search') && !e.target.closest('#batch-results') && !e.target.closest('#batch-clear')) {
      const br = $('#batch-results');
      if (br) br.classList.remove('show');
    }
  });
}

async function prefetchBatchesForItem(itemCode) {
  try {
    App.allBatches = await callServer('getAllBatchesForItem', itemCode);
  } catch(_) {
    App.allBatches = [];
  }
}

function bindBatchSearch() {
  const batchInput = $('#batch-search');
  const batchResults = $('#batch-results');
  const batchClear = $('#batch-clear');
  if (!batchInput || !batchResults) return;

  // Clear previous listeners by replacing element
  const fresh = batchInput.cloneNode(true);
  batchInput.parentNode.replaceChild(fresh, batchInput);
  const input = $('#batch-search');

  function renderBatchResults(txt) {
    _toggleClear(input, 'batch-clear');
    const existing = new Set(App.form.batches.map(b => b.batch_no));
    let available;

    if (App.allBatches.length > 0) {
      // Local search — instant
      available = App.allBatches
        .filter(b => !existing.has(b.name))
        .filter(b => !txt || b.name.toLowerCase().includes(txt.toLowerCase()));
    } else {
      // Show all if no txt, or nothing if no data
      available = [];
    }

    if (txt.length < 1 && App.allBatches.length === 0) {
      batchResults.classList.remove('show');
      return;
    }

    if (available.length === 0) {
      batchResults.innerHTML = '<div class="search-result-item" style="color:#94a3b8;">No matching batches found</div>';
    } else {
      batchResults.innerHTML = available.slice(0, 30).map(b =>
        `<div class="search-result-item" data-batch="${escHtml(b.name)}">
          <strong>${escHtml(b.name)}</strong>${b.expiry_date ? ' <span style="color:#94a3b8;font-size:11px;">exp: ' + fmtDate(b.expiry_date) + '</span>' : ''}
        </div>`
      ).join('');
    }
    batchResults.classList.add('show');
  }

  input.addEventListener('input', () => renderBatchResults(input.value.trim()));
  input.addEventListener('focus', () => renderBatchResults(input.value.trim()));

  // Batch clear button
  if (batchClear) {
    batchClear.addEventListener('click', () => {
      input.value = '';
      batchResults.classList.remove('show');
      batchClear.classList.remove('visible');
      input.focus();
    });
  }

  batchResults.addEventListener('click', async (e) => {
    const item = e.target.closest('.search-result-item');
    if (!item || !item.dataset.batch) return;
    const batchNo = item.dataset.batch;
    batchResults.classList.remove('show');
    input.value = '';

    // Guard: skip if batch already added (can happen on double-tap)
    if (App.form.batches.some(b => b.batch_no === batchNo)) {
      showToast('Batch ' + batchNo + ' already added', 'warning');
      return;
    }

    showToast('Adding batch ' + batchNo + '...', '');
    try {
      const postDate = $('#form-posting-date').value || null;
      const postTime = $('#form-posting-time').value || null;
      const state = await callServer('getBatchCurrentState',
        App.form.item, batchNo, postDate, postTime);

      const select_uom = App.form.higher_uom || App.form.default_uom;
      const cf = select_uom !== App.form.default_uom ? (Number(App.form.higher_uom_cf) || 1) : 1;
      const stockQty = Number(state.qty) || 0;

      // Double-check again after async call (in case user tapped twice)
      if (App.form.batches.some(b => b.batch_no === batchNo)) return;

      App.form.batches.push({
        batch_no: batchNo,
        item_code: App.form.item,
        warehouse: App.form.default_warehouse,
        stock_uom: state.stock_uom || App.form.default_uom,
        current_stock_in_stock_uom: stockQty,
        valuation_rate: Number(state.valuation_rate) || 0,
        select_uom: select_uom,
        conversion_factor: cf,
        current_stock_in_selected_uom: cf ? stockQty / cf : stockQty,
        item_name_selected: App.form.item_name,
        is_counted: 1,
        qty_found: 0,
      });

      recomputeFormTotals();
      renderFormBatches();
      showToast('Batch ' + batchNo + ' added (stock: ' + fmtNum(stockQty) + ')', 'success');
    } catch(e) {
      showToast(e.message || 'Failed to add batch', 'error', 4000);
    }
  });
}

let _loadBatchesId = 0; // guard against concurrent/stale calls

async function tryLoadBatches() {
  if (!App.form.item || !App.form.default_warehouse) return;

  const callId = ++_loadBatchesId; // each call gets a unique id
  const batchArea = $('#form-batches');
  batchArea.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  try {
    const postDate = $('#form-posting-date').value || null;
    const postTime = $('#form-posting-time').value || null;
    const d = await callServer('getItemDefaults',
      App.form.item, App.form.default_warehouse, postDate, postTime);

    // If a newer call was made while we were waiting, discard this result
    if (callId !== _loadBatchesId) return;

    App.form.item_name = d.item_name;
    App.form.default_uom = d.default_uom;
    App.form.higher_uom = d.higher_uom;
    App.form.higher_uom_cf = d.higher_uom_cf || 1;
    App.form.total_current_stock_in_default_uom = d.total_current_stock_in_default_uom;
    App.form.total_current_stock_in_higher_uom = d.total_current_stock_in_higher_uom;
    App.form.total_qty_found_in_default_uom = d.total_current_stock_in_default_uom;
    App.form.total_qty_found_in_higher_uom = d.total_current_stock_in_higher_uom;

    // Deduplicate batches by batch_no (prevents repeats from API)
    const seen = new Set();
    const uniqueBatches = [];
    for (const b of (d.batches || [])) {
      if (!seen.has(b.batch_no)) {
        seen.add(b.batch_no);
        uniqueBatches.push({ ...b, is_counted: 0, qty_found: 0 });
      }
    }
    App.form.batches = uniqueBatches;

    renderFormTotals();
    renderFormBatches();

    $('#form-totals').style.display = '';
    $('#form-actions').style.display = '';
    $('#form-remark-wrap').style.display = '';
    $('#add-batch-wrap').style.display = '';
    bindBatchSearch();

    if (App.form.batches.length === 0) {
      showToast('No batches with positive stock found — use Add Batch below', 'warning');
    }
  } catch (e) {
    if (callId !== _loadBatchesId) return; // stale error, ignore
    batchArea.innerHTML = `<div class="error-msg">${escHtml(e.message)}</div>`;
  }
}

function renderFormTotals() {
  const f = App.form;
  const delta = f.total_qty_found_in_default_uom - f.total_current_stock_in_default_uom;
  const deltaClass = Math.abs(delta) < 0.001 ? 'delta-matched' : (delta > 0 ? 'delta-over' : 'delta-short');

  $('#form-totals').innerHTML = `
    <div class="totals-panel">
      <div class="totals-grid">
        <div class="total-item">
          <div class="total-label">Current Stock</div>
          <div class="total-value">${fmtNum(f.total_current_stock_in_default_uom)}</div>
          <div class="total-uom">${escHtml(f.default_uom)}</div>
        </div>
        <div class="total-item">
          <div class="total-label">Actually Found</div>
          <div class="total-value ${deltaClass}">${fmtNum(f.total_qty_found_in_default_uom)}</div>
          <div class="total-uom">${escHtml(f.default_uom)}</div>
        </div>
        <div class="total-item">
          <div class="total-label">Current (${escHtml(f.higher_uom)})</div>
          <div class="total-value">${fmtNum(f.total_current_stock_in_higher_uom)}</div>
        </div>
        <div class="total-item">
          <div class="total-label">Found (${escHtml(f.higher_uom)})</div>
          <div class="total-value ${deltaClass}">${fmtNum(f.total_qty_found_in_higher_uom)}</div>
        </div>
      </div>
      <div class="card-row mt-2">
        <span class="card-label">Delta</span>
        <span class="card-value ${deltaClass}">${delta >= 0 ? '+' : ''}${fmtNum(delta)} ${escHtml(f.default_uom)}</span>
      </div>
    </div>
  `;
}

function renderFormBatches() {
  const batchArea = $('#form-batches');
  const batches = App.form.batches || [];

  if (batches.length === 0) {
    batchArea.innerHTML = '<p style="color:#94a3b8;font-size:13px;text-align:center;">No batches to show</p>';
    return;
  }

  const selUomLabel = App.form.higher_uom || App.form.default_uom;
  const stockUomLabel = App.form.default_uom;
  const showBothUom = selUomLabel !== stockUomLabel;

  batchArea.innerHTML = `
    <div class="section-header">Batches (${batches.length})</div>
    ${batches.map((b, i) => {
      const checked = b.is_counted ? 'checked' : '';
      const cardCls = b.is_counted ? 'checked' : '';
      const bSelUom = b.select_uom || selUomLabel;
      const bStockUom = b.stock_uom || stockUomLabel;
      const cf = Number(b.conversion_factor) || 1;
      const qfHigher = b.is_counted ? b.qty_found : '';
      const qfStock = (b.is_counted && b.qty_found) ? (Number(b.qty_found) * cf) : '';
      return `<div class="batch-card ${cardCls}" data-idx="${i}">
        <div class="batch-header">
          <span class="batch-name truncate" style="max-width:60%;">${escHtml(b.batch_no)}</span>
          <div class="checkbox-wrap" style="padding:0;">
            <label style="font-size:12px;color:#64748b;">Reconcile</label>
            <input type="checkbox" class="batch-counted-cb" data-idx="${i}" ${checked}>
          </div>
        </div>
        <div class="batch-fields">
          <div class="batch-field">
            <label>Current (${escHtml(bSelUom)})</label>
            <div class="value">${fmtNum(b.current_stock_in_selected_uom)}</div>
          </div>
          <div class="batch-field">
            <label>Found (${escHtml(bSelUom)})</label>
            <input type="number" class="batch-qty-higher" data-idx="${i}"
              value="${qfHigher}"
              step="0.001" min="0"
              placeholder="${b.is_counted ? '0' : '-'}"
              ${!b.is_counted ? 'disabled' : ''}>
          </div>
          <div class="batch-field">
            <label>Current (${escHtml(bStockUom)})</label>
            <div class="value">${fmtNum(b.current_stock_in_stock_uom)}</div>
          </div>
          <div class="batch-field">
            <label>Found (${escHtml(bStockUom)})</label>
            <input type="number" class="batch-qty-stock" data-idx="${i}"
              value="${qfStock}"
              step="0.001" min="0"
              placeholder="${b.is_counted ? '0' : '-'}"
              ${!b.is_counted ? 'disabled' : ''}>
          </div>
        </div>
        ${showBothUom ? `<div style="text-align:right;font-size:10px;color:#94a3b8;margin-top:2px;">CF: 1 ${escHtml(bSelUom)} = ${fmtNum(cf, 2)} ${escHtml(bStockUom)}</div>` : ''}
      </div>`;
    }).join('')}
  `;

  // Bind events
  batchArea.querySelectorAll('.batch-counted-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      const idx = parseInt(cb.dataset.idx);
      App.form.batches[idx].is_counted = cb.checked ? 1 : 0;
      if (!cb.checked) App.form.batches[idx].qty_found = 0;
      recomputeFormTotals();
      renderFormBatches(); // re-render to enable/disable input
    });
  });

  // Higher UOM input — updates qty_found (stored in higher UOM), syncs stock UOM field
  batchArea.querySelectorAll('.batch-qty-higher').forEach(inp => {
    inp.addEventListener('input', () => {
      const idx = parseInt(inp.dataset.idx);
      const b = App.form.batches[idx];
      b.qty_found = parseFloat(inp.value) || 0;
      if (!b.is_counted) b.is_counted = 1;
      // Sync stock UOM field
      const cf = Number(b.conversion_factor) || 1;
      const stockInp = batchArea.querySelector(`.batch-qty-stock[data-idx="${idx}"]`);
      if (stockInp) stockInp.value = b.qty_found ? (b.qty_found * cf).toFixed(3) : '';
      recomputeFormTotals();
    });
  });

  // Stock UOM input — reverse-converts to higher UOM and stores in qty_found
  batchArea.querySelectorAll('.batch-qty-stock').forEach(inp => {
    inp.addEventListener('input', () => {
      const idx = parseInt(inp.dataset.idx);
      const b = App.form.batches[idx];
      const stockVal = parseFloat(inp.value) || 0;
      const cf = Number(b.conversion_factor) || 1;
      b.qty_found = cf ? stockVal / cf : stockVal;
      if (!b.is_counted) b.is_counted = 1;
      // Sync higher UOM field
      const higherInp = batchArea.querySelector(`.batch-qty-higher[data-idx="${idx}"]`);
      if (higherInp) higherInp.value = b.qty_found ? b.qty_found.toFixed(3) : '';
      recomputeFormTotals();
    });
  });
}

function recomputeFormTotals() {
  let totalCurrent = 0, totalFound = 0;
  for (const b of App.form.batches) {
    const cur = Number(b.current_stock_in_stock_uom) || 0;
    totalCurrent += cur;
    if (b.is_counted) {
      const cf = Number(b.conversion_factor) || 1;
      totalFound += (Number(b.qty_found) || 0) * cf;
    } else {
      totalFound += cur;
    }
  }
  App.form.total_current_stock_in_default_uom = totalCurrent;
  App.form.total_qty_found_in_default_uom = totalFound;
  const hcf = Number(App.form.higher_uom_cf) || 1;
  App.form.total_current_stock_in_higher_uom = totalCurrent / hcf;
  App.form.total_qty_found_in_higher_uom = totalFound / hcf;
  renderFormTotals();
}

async function saveForm() {
  if (!validateForm()) return;
  const btn = $('#btn-save');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    const payload = buildFormPayload();
    const result = await callServer('saveSrtForm', payload, App.form.name || null);
    App.form.name = result.name;
    App.form.modified = result.modified;

    // ── ERP VERIFICATION ──
    // Re-fetch from Frappe to confirm the draft actually landed. A
    // successful save call alone isn't enough — we want to be sure the
    // doc exists on the server with docstatus 0 before navigating away.
    const savedName = App.form.name;
    let verifyOk = false;
    let verifyError = '';
    try {
      const verifyDoc = await callServer('getSrtDoc', savedName);
      if (verifyDoc && verifyDoc.name === savedName && Number(verifyDoc.docstatus) === 0) {
        verifyOk = true;
      } else if (verifyDoc && Number(verifyDoc.docstatus) >= 1) {
        verifyError = 'Server shows this document is already submitted (not a draft).';
      } else {
        verifyError = 'Server returned no matching document.';
      }
    } catch (e) {
      verifyError = 'ERP read-back failed: ' + (e.message || e);
    }

    if (!verifyOk) {
      showModal(`
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div class="modal-title" style="color:#e11d48;">ERP Verification Failed</div>
        </div>
        <div class="modal-body">
          <div class="error-msg">
            <strong>${escHtml(savedName)}</strong> appeared to save, but the Frappe server could not confirm it.
          </div>
          <p class="mt-3" style="font-size:13px;color:#475569;">
            <strong>Reason:</strong> ${escHtml(verifyError)}
          </p>
          <p class="mt-2" style="font-size:13px;color:#475569;">
            Do <strong>not</strong> assume the draft is posted. Open the Frappe desk to check, or retry save.
          </p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline btn-full" onclick="closeModal()">Acknowledge</button>
        </div>
      `);
      showToast('ERP verification failed for ' + savedName, 'error', 6000);
      return;  // stay on the form so the user can retry
    }

    showToast('Saved on ERP: ' + savedName, 'success', 4000);
    App.history.lastSubmittedName = savedName;
    // Clear the form state so navigating back to "New SRT" starts fresh
    // (and the just-saved doc can't be accidentally re-saved on top).
    resetForm();
    navigateTo('history');
  } catch (e) {
    showToast(e.message || 'Save failed', 'error', 5000);
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

async function submitForm() {
  if (!validateForm()) return;

  // Check user remark is filled
  const userRemarkEl = $('#form-user-remark');
  const userRemark = userRemarkEl ? userRemarkEl.value.trim() : '';
  if (!userRemark) {
    showToast('User Remark is required', 'warning');
    if (userRemarkEl) userRemarkEl.focus();
    return;
  }

  // Check at least one row is ticked
  const ticked = App.form.batches.filter(b => b.is_counted);
  if (ticked.length === 0) {
    showToast('Tick "Reconcile" on at least one batch', 'warning');
    return;
  }

  const btn = $('#btn-submit');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    // Save first if not yet saved
    if (!App.form.name) {
      const payload = buildFormPayload();
      const saveResult = await callServer('saveSrtForm', payload, null);
      App.form.name = saveResult.name;
      App.form.modified = saveResult.modified;
    } else {
      // Save latest changes
      const payload = buildFormPayload();
      const saveResult = await callServer('saveSrtForm', payload, App.form.name);
      App.form.modified = saveResult.modified;
    }

    // Now submit
    const result = await callServer('submitSrtForm', App.form.name);
    const state = result.workflow_state || '';

    // ── ERP VERIFICATION ──
    // Re-fetch from Frappe to confirm the submit actually landed.
    // Frontend "success" alone is not enough — show a hard warning
    // if the server can't confirm the doc with docstatus >= 1.
    const submittedName = App.form.name;
    let verifyOk = false;
    let verifyError = '';
    try {
      const verifyDoc = await callServer('getSrtDoc', submittedName);
      if (verifyDoc && verifyDoc.name === submittedName && Number(verifyDoc.docstatus) >= 1) {
        verifyOk = true;
      } else if (verifyDoc && Number(verifyDoc.docstatus) === 0) {
        verifyError = 'Save reached ERP but Submit did not — document is still a Draft on the server.';
      } else {
        verifyError = 'Server returned no matching document.';
      }
    } catch (e) {
      verifyError = 'ERP read-back failed: ' + (e.message || e);
    }

    if (!verifyOk) {
      showModal(`
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div class="modal-title" style="color:#e11d48;">ERP Verification Failed</div>
        </div>
        <div class="modal-body">
          <div class="error-msg">
            <strong>${escHtml(submittedName)}</strong> appeared to submit, but the Frappe server could not confirm it.
          </div>
          <p class="mt-3" style="font-size:13px;color:#475569;">
            <strong>Reason:</strong> ${escHtml(verifyError)}
          </p>
          <p class="mt-2" style="font-size:13px;color:#475569;">
            Do <strong>not</strong> assume the SRT is posted. Open the Frappe desk to check this document, or retry submit.
          </p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline btn-full" onclick="closeModal()">Acknowledge</button>
        </div>
      `);
      showToast('ERP verification failed for ' + submittedName, 'error', 6000);
      return;  // stay on the form
    }

    if (state === 'Approved By System') {
      showToast('All batches matched — Auto-Approved by System!', 'success', 4000);
    } else {
      showToast('Submitted to ERP: ' + submittedName + ' → ' + state, 'success', 4000);
    }

    // Remember the just-submitted name so History can do a list-level
    // double-check (some Frappe configs may delay list visibility).
    App.history.lastSubmittedName = submittedName;
    // Clear the form so the next "New SRT" tap starts blank, not
    // pre-populated with the doc the user just submitted.
    resetForm();
    navigateTo('history');
  } catch (e) {
    showToast(e.message || 'Submit failed', 'error', 5000);
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

function validateForm() {
  if (!App.form.item) { showToast('Select an item', 'warning'); return false; }
  if (!App.form.default_warehouse) { showToast('Select a warehouse', 'warning'); return false; }
  return true;
}

function buildFormPayload() {
  const remarkEl = $('#form-user-remark');
  return {
    item: App.form.item,
    default_warehouse: App.form.default_warehouse,
    posting_date: $('#form-posting-date').value || App.form.posting_date,
    posting_time: $('#form-posting-time').value || App.form.posting_time,
    user_remark: remarkEl ? remarkEl.value : '',
    batches: App.form.batches.map(b => ({
      batch_no: b.batch_no,
      item_code: b.item_code || App.form.item,
      warehouse: b.warehouse || App.form.default_warehouse,
      stock_uom: b.stock_uom,
      select_uom: b.select_uom,
      conversion_factor: b.conversion_factor,
      current_stock_in_stock_uom: b.current_stock_in_stock_uom,
      current_stock_in_selected_uom: b.current_stock_in_selected_uom,
      valuation_rate: b.valuation_rate,
      qty_found: b.is_counted ? b.qty_found : 0,
      is_counted: b.is_counted ? 1 : 0,
      item_name_selected: b.item_name_selected || App.form.item_name,
    })),
    modified: App.form.modified,
  };
}

async function renderHistory() {
  const area = $('#content-area');
  area.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  try {
    // If admin/super admin, show all; else show own
    let rows;
    if (isAdmin() || isSuperAdmin()) {
      rows = await callServer('getAllSrtHistory', 100, 0);
    } else {
      rows = await callServer('getSrtHistory', 100, 0);
    }
    App.history.rows = rows;

    if (rows.length === 0) {
      area.innerHTML = `<div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <h3>No SRT records yet</h3>
        <p>Create your first Stock Reconciliation to see it here.</p>
      </div>`;
      return;
    }

    // Today's rows get a yellow highlight + an explicit timestamp on the
    // card so the user can sanity-check each newly created SRT against ERP.
    area.innerHTML = `
      <div class="refresh-bar">
        <button onclick="renderHistory()">Refresh</button>
      </div>
      ${rows.map(r => {
        const pill = statusPill(r.workflow_state);
        const stateText = r.docstatus === 2 ? '<span class="pill pill-cancelled">Cancelled</span>' : pill;
        const todayCls = isToday(r.creation) ? ' highlight-new' : '';
        const ts = fmtDateTime(r.creation);
        return `<div class="card${todayCls}" data-name="${escHtml(r.name)}" onclick="viewSrt('${escHtml(r.name)}')">
          <div class="flex items-center justify-between">
            <div style="min-width:0;flex:1;">
              <div class="card-title truncate">${escHtml(r.item)} : ${escHtml(r.item_name || '')}</div>
              <div class="card-subtitle truncate">${escHtml(r.name)}</div>
            </div>
            ${stateText}
          </div>
          <div class="card-row" style="margin-top:6px;">
            <span class="card-label">${escHtml(r.default_warehouse || '')}</span>
            <span class="card-label">${fmtDate(r.posting_date)}</span>
          </div>
          ${ts ? `<div class="card-row" style="margin-top:4px;">
            <span class="card-label" style="font-size:11px;">Created</span>
            <span class="card-label" style="font-size:12px;font-weight:600;color:#334155;">${escHtml(ts)}</span>
          </div>` : ''}
        </div>`;
      }).join('')}
    `;

    // List-level verification — if we just submitted something but the
    // ERP-backed list doesn't include it, surface a hard warning.
    const expected = App.history.lastSubmittedName;
    if (expected) {
      const inList = rows.some(r => r.name === expected);
      if (!inList) {
        showToast(
          'WARNING: ' + expected + ' was saved but is not in the ERP history list. Verify in Frappe desk.',
          'error', 8000
        );
      } else {
        // Scroll to it so the user sees the highlight.
        setTimeout(() => {
          const card = area.querySelector(`.card[data-name="${expected}"]`);
          if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 50);
      }
      App.history.lastSubmittedName = null;  // consume one-shot
    }
  } catch (e) {
    if (e.message && e.message.includes('SESSION_EXPIRED')) {
      showToast('Session expired', 'error');
      showPage('page-login');
      return;
    }
    area.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${escHtml(e.message)}</p></div>`;
  }
}
</script>
